name: Deploy spec to Hub Hermes
on:
  push:
    branches: [main]

jobs:
  deploy:
    if: contains(github.event.head_commit.message, 'REQUIRES HUB SPEC DEPLOY')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse modules from commit
        id: parse
        run: |
          MSG=$(git log -1 --pretty=%B)
          MODULES=$(echo "$MSG" | grep -oE 'REQUIRES HUB SPEC DEPLOY: [a-z_,[:space:]]+' \
            | sed 's/REQUIRES HUB SPEC DEPLOY: //' | tr ',' '\n' | tr -s ' ' '\n' \
            | grep -v '^$' | sort -u | tr '\n' ' ')
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Detected modules: $MODULES"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build top-level _index.json
        run: |
          node scripts/build_top_index.mjs
          echo "=== generated _index.json (head) ==="
          head -30 _index.json
          echo "=== skill count ==="
          node -e "console.log(require('./_index.json').skills.length)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HUB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 34.142.240.11 >> ~/.ssh/known_hosts 2>/dev/null
          echo "=== Key file size ==="
          wc -l ~/.ssh/id_ed25519
          echo "=== Key fingerprint (should match: SHA256:... ed25519) ==="
          ssh-keygen -lf ~/.ssh/id_ed25519 || echo "INVALID KEY FORMAT"
          echo "=== Test SSH with -v ==="
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=10 -v ${{ secrets.HUB_SSH_USER }}@34.142.240.11 "whoami; hostname" 2>&1 | tail -30 || true

      - name: Deploy to Hub Hermes
        env:
          HUB_USER: ${{ secrets.HUB_SSH_USER }}
          HUB_HOST: 34.142.240.11
          MODULES: ${{ steps.parse.outputs.modules }}
        run: |
          set -e
          [ -z "$MODULES" ] && { echo "No modules detected — abort"; exit 1; }

          # Tar bundle: 2 module dirs + 3 root spec files
          TAR_FILES=""
          for m in $MODULES; do
            [ -d "$m" ] || { echo "Module dir $m not found"; exit 1; }
            TAR_FILES="$TAR_FILES $m"
          done
          for f in _index.json _tool_spec_anthropic.json _tool_spec_anthropic_implemented.json _master_manifest.json; do
            [ -f "$f" ] && TAR_FILES="$TAR_FILES $f"
          done
          tar czf /tmp/spec-bundle.tgz $TAR_FILES
          ls -lh /tmp/spec-bundle.tgz

          scp -i ~/.ssh/id_ed25519 /tmp/spec-bundle.tgz $HUB_USER@$HUB_HOST:/tmp/spec-bundle.tgz

          ssh -i ~/.ssh/id_ed25519 $HUB_USER@$HUB_HOST bash -s <<EOSSH
            set -e
            HERMES=\$(docker ps --format '{{.Names}}' | grep -i hermes-api | head -1)
            echo "Hermes container: \$HERMES"
            [ -z "\$HERMES" ] && { echo "FATAL: hermes container not found"; exit 1; }

            echo "=== Discover skill paths inside Hermes container ==="
            docker exec \$HERMES find / -name "_index.json" -path "*crm*" 2>/dev/null | head -5
            echo "=== /app/hermes/skills/ tree ==="
            docker exec \$HERMES ls -la /app/hermes/skills/ 2>/dev/null || echo "no /app/hermes/skills"
            echo "=== /opt/hermes/skills/ tree ==="
            docker exec \$HERMES ls -la /opt/hermes/skills/ 2>/dev/null || echo "no /opt/hermes/skills"
            echo "=== spaclaw_skills.py SKILLS_ROOT ==="
            docker exec \$HERMES python3 -c "from hermes.tools.spaclaw_skills import SKILLS_ROOT; print('SKILLS_ROOT=', SKILLS_ROOT)" 2>&1 | tail -3 || true

            rm -rf /tmp/hcs-deploy
            mkdir -p /tmp/hcs-deploy
            tar xzf /tmp/spec-bundle.tgz -C /tmp/hcs-deploy

            cd /tmp/hcs-deploy
            # Deploy to BOTH paths so we always hit the right one
            for SKILLS_PATH in /opt/hermes/skills/crm /app/hermes/skills/crm; do
              docker exec \$HERMES test -d \$SKILLS_PATH 2>/dev/null || { echo "skip \$SKILLS_PATH (not exist)"; continue; }
              echo "==> deploying to \$SKILLS_PATH"
              for m in $MODULES; do
                docker exec \$HERMES rm -rf \$SKILLS_PATH/\$m 2>/dev/null || true
                docker cp \$m \$HERMES:\$SKILLS_PATH/
                echo "  deployed module: \$m"
              done
              for f in _index.json _tool_spec_anthropic.json _tool_spec_anthropic_implemented.json _master_manifest.json; do
                if [ -f \$f ]; then
                  docker cp \$f \$HERMES:\$SKILLS_PATH/\$f
                  echo "  deployed root: \$f"
                fi
              done
            done

            docker restart \$HERMES
            sleep 6
            docker ps --filter name=\$HERMES --format 'table {{.Names}}\t{{.Status}}'

            echo "=== Verify top-level _index.json post-deploy ==="
            for SKILLS_PATH in /opt/hermes/skills/crm /app/hermes/skills/crm; do
              docker exec \$HERMES test -f \$SKILLS_PATH/_index.json 2>/dev/null || continue
              echo "--- \$SKILLS_PATH/_index.json ---"
              docker exec \$HERMES python3 -c "import json; d=json.load(open('\$SKILLS_PATH/_index.json')); print('skills:', len(d.get('skills',[]))); print('names:', [s['name'] for s in d.get('skills',[])])"
            done
            echo "==> DONE: deployed $MODULES"
          EOSSH
